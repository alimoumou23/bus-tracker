<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>BusTrack Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<!-- Firebase Compat -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
:root{--bg:#1a1a1a;--surface:#252525;--surface2:#2e2e2e;--border:#383838;--text:#f0f0f0;--muted:#666;--pose:#00e676;--depose:#e65c00;--film:#2979ff;--accent:#F7C100;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overscroll-behavior:none;}
.header{background:#3D3D3D;border-bottom:3px solid var(--accent);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);letter-spacing:2px;line-height:1;}
.header-sub{font-size:9px;color:var(--muted);letter-spacing:3px;margin-top:2px;}
.header-count{background:var(--accent);color:#3D3D3D;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;letter-spacing:1px;}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
.tab{flex:1;padding:12px;text-align:center;font-size:11px;letter-spacing:2px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:bold;}
.page{display:none;padding:16px;max-width:520px;margin:0 auto;}
.page.active{display:block;}
.card{background:var(--surface);border-radius:12px;padding:18px;border:1px solid var(--border);margin-bottom:14px;}
.card-title{font-size:10px;color:var(--muted);letter-spacing:3px;margin-bottom:12px;}
.field{margin-bottom:14px;}
.field:last-child{margin-bottom:0;}
label.lbl{display:block;font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;}
input[type=text],input[type=number]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:15px;outline:none;transition:border-color 0.2s;}
input[type=number]{font-size:22px;font-weight:500;}
input:focus{border-color:var(--accent);}
.sd-wrap{position:relative;}
.sd-display{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 40px 12px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;cursor:pointer;display:flex;align-items:center;min-height:46px;transition:border-color 0.2s;}
.sd-display.open{border-color:var(--accent);}
.sd-display-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sd-display.empty-val .sd-display-text{color:var(--muted);}
.sd-arrow{color:var(--muted);font-size:11px;flex-shrink:0;margin-left:8px;}
.sd-panel{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--accent);border-radius:10px;z-index:999;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.6);}
.sd-panel.open{display:block;}
.sd-search{padding:10px;border-bottom:1px solid var(--border);}
.sd-search input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
.sd-search input:focus{border-color:var(--accent);}
.sd-list{max-height:180px;overflow-y:auto;}
.sd-item{padding:11px 14px;font-size:13px;cursor:pointer;transition:background 0.1s;}
.sd-item:hover{background:var(--border);}
.sd-item.selected{color:var(--accent);}
.sd-item.add-new{color:var(--accent);border-top:1px solid var(--border);font-style:italic;}
.sd-item.add-new:hover{background:rgba(255,109,0,0.1);}
.sd-empty{padding:12px 14px;font-size:12px;color:var(--muted);text-align:center;}
.actions-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.act-btn{padding:14px 4px;border-radius:10px;border:2px solid var(--border);cursor:pointer;font-family:'DM Mono',monospace;font-weight:500;font-size:12px;letter-spacing:1px;background:var(--bg);color:var(--muted);transition:all 0.15s;text-align:center;line-height:1.5;}
.act-btn .act-icon{font-size:22px;display:block;margin-bottom:4px;}
.act-btn.pose.active{border-color:var(--pose);background:rgba(0,230,118,0.08);color:var(--pose);}
.act-btn.depose.active{border-color:var(--depose);background:rgba(255,109,0,0.08);color:var(--depose);}
.act-btn.film.active{border-color:var(--film);background:rgba(41,121,255,0.08);color:var(--film);}
.photo-label{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--bg);border:2px dashed var(--border);border-radius:10px;padding:28px 20px;cursor:pointer;transition:border-color 0.2s;}
.photo-label:hover{border-color:var(--accent);}
.ph-icon{font-size:36px;}
.ph-text{font-size:11px;color:var(--muted);letter-spacing:2px;}
.preview-wrap{position:relative;}
.preview-img{width:100%;border-radius:10px;max-height:200px;object-fit:cover;display:block;}
.change-photo{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:11px;font-family:'DM Mono',monospace;}
.fname-box{background:var(--bg);border-radius:8px;padding:12px 14px;border-left:3px solid var(--accent);margin-bottom:14px;}
.fname-lbl{font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:4px;}
.fname-val{font-size:12px;color:var(--accent);word-break:break-all;font-weight:500;}
.btn-primary{width:100%;padding:16px;border-radius:10px;border:none;font-family:'DM Mono',monospace;font-weight:500;font-size:14px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;background:var(--accent);color:#3D3D3D;font-weight:700;}
.btn-primary:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed;}
.progress-wrap{margin-bottom:14px;}
.progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.3s;}
.progress-text{font-size:11px;color:var(--muted);margin-top:4px;text-align:center;}
.hist-filters{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;white-space:nowrap;letter-spacing:1px;flex-shrink:0;}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.hist-item{background:var(--surface);border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);display:flex;gap:12px;align-items:center;}
.hist-thumb{width:52px;height:52px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--surface2);}
.hist-info{flex:1;min-width:0;}
.hist-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.hist-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;letter-spacing:1px;}
.hist-badge.pose{background:rgba(0,230,118,0.15);color:var(--pose);}
.hist-badge.depose{background:rgba(255,109,0,0.15);color:var(--depose);}
.hist-badge.film{background:rgba(41,121,255,0.15);color:var(--film);}
.hist-bus{font-size:13px;font-weight:500;}
.hist-fname{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.hist-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.hist-dl{background:var(--surface2);border:none;color:var(--text);border-radius:6px;padding:6px 8px;cursor:pointer;font-size:14px;}
.hist-del{background:transparent;border:none;color:#555;border-radius:6px;padding:6px 8px;cursor:pointer;font-size:14px;}
.hist-del:hover{color:#e53935;}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:12px;letter-spacing:1px;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.stat-box{background:var(--surface);border-radius:10px;padding:14px;text-align:center;border:1px solid var(--border);}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;}
.stat-lbl{font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:2px;}
.stat-box.pose .stat-num{color:var(--pose);}
.stat-box.depose .stat-num{color:var(--depose);}
.stat-box.film .stat-num{color:var(--film);}
.export-btn{width:100%;padding:14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;transition:all 0.2s;}
.export-btn:hover{border-color:var(--accent);color:var(--accent);}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.tag{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;display:flex;align-items:center;gap:6px;}
.tag-del{cursor:pointer;color:var(--muted);font-size:14px;line-height:1;}
.tag-del:hover{color:#e53935;}
.add-tag-row{display:flex;gap:8px;margin-top:10px;}
.add-tag-row input{flex:1;}
.add-tag-btn{background:var(--accent);border:none;color:#fff;border-radius:8px;padding:10px 16px;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:12px;letter-spacing:1px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:12px;letter-spacing:1px;gap:10px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--pose);}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.page.active{animation:fadeIn 0.25s ease;}
</style>
</head>

<div class="tabs">
  <div class="tab active" onclick="showTab('capture',this)">📷 CAPTURE</div>
  <div class="tab" onclick="showTab('history',this)">👥 ÉQUIPE</div>
  <div class="tab" onclick="showTab('export',this)">📊 RAPPORT</div>
  <div class="tab" onclick="showTab('settings',this)">⚙️ CONFIG</div>
</div>

<!-- CAPTURE -->
<div class="page active" id="page-capture">
  <div class="card">
    <div class="card-title">INFORMATIONS</div>
    <div class="field">
      <label class="lbl">N° BUS</label>
      <input type="number" id="busNum" placeholder="Ex: 42" oninput="updatePreview()"/>
    </div>
    <div class="field"><label class="lbl">CAMPAGNE</label><div class="sd-wrap" id="sd-campagne"></div></div>
    <div class="field"><label class="lbl">DÉPÔT</label><div class="sd-wrap" id="sd-depot"></div></div>
    <div class="field"><label class="lbl">POSEUR</label><div class="sd-wrap" id="sd-poseur"></div></div>
  </div>
  <div class="card">
    <div class="card-title">ACTION</div>
    <div class="actions-grid">
      <button class="act-btn pose active" onclick="setAction('POSE')"><span class="act-icon">🖼️</span>POSE<br/><span style="font-size:9px">Habillage</span></button>
      <button class="act-btn depose" onclick="setAction('DEPOSE')"><span class="act-icon">🗑️</span>DEPOSE<br/><span style="font-size:9px">Habillage</span></button>
      <button class="act-btn film" onclick="setAction('FILM')"><span class="act-icon">🛡️</span>FILM<br/><span style="font-size:9px">Protection</span></button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">PHOTO</div>
    <input type="file" accept="image/*" capture="environment" id="fileInput" style="display:none" onchange="handleFile(this)"/>
    <div id="photoArea">
      <label for="fileInput" class="photo-label">
        <span class="ph-icon">📷</span>
        <span class="ph-text">PRENDRE / CHOISIR PHOTO</span>
      </label>
    </div>
  </div>
  <div class="fname-box" id="fnameBox" style="display:none">
    <div class="fname-lbl">NOM DU FICHIER</div>
    <div class="fname-val" id="fnameVal"></div>
  </div>
  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">Upload en cours...</div>
  </div>
  <div id="btnArea">
    <button class="btn-primary" id="dlBtn" onclick="doCapture()" disabled>📤 ENVOYER LA PHOTO</button>
  </div>
</div>

<!-- ÉQUIPE -->
<div class="page" id="page-history">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
    <button onclick="changeDate(-1)" style="background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:16px;">&#8249;</button>
    <div id="dateDisplay" style="flex:1;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:13px;letter-spacing:1px;cursor:pointer;" onclick="pickDate()"></div>
    <button onclick="changeDate(1)" style="background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:16px;">&#8250;</button>
  </div>
  <input type="date" id="datePicker" style="display:none" onchange="onDatePick(this.value)"/>
  <div class="hist-filters" style="margin-bottom:8px;" id="actionFilters">
    <button class="filter-btn active" onclick="setHistFilter('action','ALL',this)">TOUT</button>
    <button class="filter-btn" onclick="setHistFilter('action','POSE',this)">POSE</button>
    <button class="filter-btn" onclick="setHistFilter('action','DEPOSE',this)">DEPOSE</button>
    <button class="filter-btn" onclick="setHistFilter('action','FILM',this)">FILM</button>
  </div>
  <div class="hist-filters" id="poseurFilters" style="margin-bottom:10px;"></div>
  <div id="histSummary" style="font-size:11px;color:var(--muted);margin-bottom:10px;letter-spacing:1px;text-align:right;"></div>
  <div id="histList"><div class="loader"><div class="sync-dot"></div>&nbsp;Chargement...</div></div>
</div>

<!-- RAPPORT -->
<div class="page" id="page-export">
  <div class="stats-grid">
    <div class="stat-box pose"><div class="stat-num" id="statPose">0</div><div class="stat-lbl">POSE</div></div>
    <div class="stat-box depose"><div class="stat-num" id="statDepose">0</div><div class="stat-lbl">DEPOSE</div></div>
    <div class="stat-box film"><div class="stat-num" id="statFilm">0</div><div class="stat-lbl">FILM</div></div>
  </div>
  <div class="card">
    <div class="card-title">EXPORTER</div>
    <button class="export-btn" onclick="exportCSV()"><span>📊</span> Exporter CSV (Excel)</button>
    <button class="export-btn" onclick="exportTXT()"><span>📄</span> Exporter liste TXT</button>
  </div>
</div>

<!-- CONFIG -->
<div class="page" id="page-settings">
  <div class="card">
    <div class="card-title">CAMPAGNES</div>
    <div class="tag-list" id="campList"></div>
    <div class="add-tag-row">
      <input type="text" id="newCamp" placeholder="Nom campagne"/>
      <button class="add-tag-btn" onclick="addItem('camp')">+ Ajouter</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">DÉPÔTS</div>
    <div class="tag-list" id="depotList"></div>
    <div class="add-tag-row">
      <input type="text" id="newDepot" placeholder="Nom dépôt"/>
      <button class="add-tag-btn" onclick="addItem('depot')">+ Ajouter</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">POSEURS</div>
    <div class="tag-list" id="poseurList"></div>
    <div class="add-tag-row">
      <input type="text" id="newPoseur" placeholder="Nom poseur"/>
      <button class="add-tag-btn" onclick="addItem('poseur')">+ Ajouter</button>
    </div>
  </div>

<script>

// ══ LOGIN ══
const PASSWORDS = { equipe: 'casv2024', admin: 'admin2024' };
let _currentRole = 'equipe';

function setRole(role){
  _currentRole = role;
  document.getElementById('roleEquipe').classList.toggle('active', role==='equipe');
  document.getElementById('roleAdmin').classList.toggle('active', role==='admin');
}

function doLogin(){
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  if(pass === PASSWORDS[_currentRole]){
    document.getElementById('loginScreen').style.display = 'none';
    if(_currentRole === 'equipe'){
      // Equipe: hide RAPPORT and CONFIG tabs
      document.querySelectorAll('.tab')[2].style.display = 'none';
      document.querySelectorAll('.tab')[3].style.display = 'none';
    }
    err.style.display = 'none';
  } else {
    err.style.display = 'block';
    document.getElementById('loginPass').value = '';
  }
}

// ══ FIREBASE INIT ══
const firebaseConfig = {
  apiKey: "AIzaSyDF-tmpN-rZwlVsLCHcQVcXxWvKZFDn22c",
  authDomain: "alsa-bus-2ec91.firebaseapp.com",
  projectId: "alsa-bus-2ec91",
  storageBucket: "alsa-bus-2ec91.firebasestorage.app",
  messagingSenderId: "456087602293",
  appId: "1:456087602293:web:7e68499122b412a3f5a43c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// ══ STATE ══
let _state = { action:'POSE', file:null, fileURL:null, filter:'ALL' };
let _cfg = { camps:[], depots:['Maarif','Sidi Barnousi','Madiouna','Bane Msik'], poseurs:[] };
let _records = [];
let _sdValues = { campagne:'', depot:'', poseur:'' };

// ══ INIT ══
async function init(){
  try {
    const cfgDoc = await db.collection('config').doc('main').get();
    if(cfgDoc.exists){
      const d = cfgDoc.data();
      if(d.camps) _cfg.camps = d.camps;
      if(d.depots) _cfg.depots = d.depots;
      if(d.poseurs) _cfg.poseurs = d.poseurs;
    }
  } catch(e){}
  buildAllDropdowns();

  // Real-time listener
  db.collection('records').orderBy('timestamp','desc').onSnapshot(snapshot => {
    _records = [];
    snapshot.forEach(d => _records.push({id:d.id, ...d.data()}));
    updateHeaderCount();
    if(document.getElementById('page-history').classList.contains('active')) renderHistory();
    if(document.getElementById('page-export').classList.contains('active')) renderStats();
  });
}

async function saveConfig(){
  try { await db.collection('config').doc('main').set(_cfg); } catch(e){}
}

// ══ TABS ══
function showTab(tab, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  el.classList.add('active');
  closeAllDropdowns();
  if(tab==='history') initHistoryTab();
  if(tab==='export') renderStats();
  if(tab==='settings') renderSettings();
}

// ══ SEARCHABLE DROPDOWN ══
function buildDropdown(containerId, key, items, placeholder){
  const wrap = document.getElementById(containerId);
  const val = _sdValues[key];
  wrap.innerHTML = `
    <div class="sd-display ${val?'has-val':'empty-val'}" id="sd-btn-${key}" onclick="toggleDropdown('${key}')">
      <span class="sd-display-text">${val||placeholder}</span>
      <span class="sd-arrow">▼</span>
    </div>
    <div class="sd-panel" id="sd-panel-${key}">
      <div class="sd-search">
        <input type="text" placeholder="Rechercher..." id="sd-search-${key}" oninput="filterDropdown('${key}')" onclick="event.stopPropagation()"/>
      </div>
      <div class="sd-list" id="sd-list-${key}">${renderDropdownItems(key,items,'')}</div>
    </div>`;
}

function renderDropdownItems(key, items, q){
  const filtered = q ? items.filter(i=>i.toLowerCase().includes(q.toLowerCase())) : items;
  let html = '';
  if(!filtered.length && !q) html += `<div class="sd-empty">Aucun — ajoutez depuis CONFIG</div>`;
  else if(!filtered.length) html += `<div class="sd-empty">Aucun résultat</div>`;
  else filtered.forEach(item=>{
    html += `<div class="sd-item${_sdValues[key]===item?' selected':''}" onclick="selectDropdown('${key}','${item.replace(/'/g,"\\'")}')">${item}${_sdValues[key]===item?' ✓':''}</div>`;
  });
  const lbl = {campagne:'campagne',depot:'dépôt',poseur:'poseur'}[key];
  html += `<div class="sd-item add-new" onclick="addNewFromDropdown('${key}','${q.replace(/'/g,"\\'")}')">➕ ${q?'Ajouter "'+q+'"':'Ajouter '+lbl+'...'}</div>`;
  return html;
}

function toggleDropdown(key){
  const panel = document.getElementById('sd-panel-'+key);
  const isOpen = panel.classList.contains('open');
  closeAllDropdowns();
  if(!isOpen){
    panel.classList.add('open');
    document.getElementById('sd-btn-'+key).classList.add('open');
    setTimeout(()=>{ const s=document.getElementById('sd-search-'+key); if(s) s.focus(); },100);
  }
}

function closeAllDropdowns(){
  document.querySelectorAll('.sd-panel').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('.sd-display').forEach(b=>b.classList.remove('open'));
}

function filterDropdown(key){
  const q = document.getElementById('sd-search-'+key).value;
  const arrMap = {campagne:'camps',depot:'depots',poseur:'poseurs'};
  document.getElementById('sd-list-'+key).innerHTML = renderDropdownItems(key, _cfg[arrMap[key]], q);
}

function selectDropdown(key, val){
  _sdValues[key] = val;
  closeAllDropdowns();
  rebuildDropdown(key);
  updatePreview();
}

async function addNewFromDropdown(key, val){
  const arrMap = {campagne:'camps',depot:'depots',poseur:'poseurs'};
  const labelMap = {campagne:'Campagne',depot:'Dépôt',poseur:'Poseur'};
  const input = val || prompt('Nouveau '+labelMap[key]+':');
  if(!input||!input.trim()) return;
  const v = input.trim();
  if(!_cfg[arrMap[key]].includes(v)){ _cfg[arrMap[key]].push(v); await saveConfig(); }
  _sdValues[key] = v;
  closeAllDropdowns();
  rebuildDropdown(key);
  updatePreview();
}

function rebuildDropdown(key){
  const config = {
    campagne:{containerId:'sd-campagne',placeholder:'— Sélectionner campagne —',arr:'camps'},
    depot:{containerId:'sd-depot',placeholder:'— Sélectionner dépôt —',arr:'depots'},
    poseur:{containerId:'sd-poseur',placeholder:'— Sélectionner poseur —',arr:'poseurs'}
  };
  const c = config[key];
  buildDropdown(c.containerId, key, _cfg[c.arr], c.placeholder);
}

function buildAllDropdowns(){
  buildDropdown('sd-campagne','campagne',_cfg.camps,'— Sélectionner campagne —');
  buildDropdown('sd-depot','depot',_cfg.depots,'— Sélectionner dépôt —');
  buildDropdown('sd-poseur','poseur',_cfg.poseurs,'— Sélectionner poseur —');
}

document.addEventListener('click', e=>{ if(!e.target.closest('.sd-wrap')) closeAllDropdowns(); });

// ══ ACTION ══
function setAction(a){
  _state.action = a;
  document.querySelectorAll('.act-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.act-btn.'+a.toLowerCase()).classList.add('active');
  updatePreview();
}

// ══ FILE ══
function handleFile(input){
  const f = input.files[0]; if(!f) return;
  _state.file = f; _state.fileURL = URL.createObjectURL(f);
  document.getElementById('photoArea').innerHTML = `
    <div class="preview-wrap">
      <img src="${_state.fileURL}" class="preview-img"/>
      <button class="change-photo" onclick="changePhoto()">🔄 Changer</button>
    </div>`;
  updatePreview();
}

function changePhoto(){
  _state.file=null; _state.fileURL=null;
  document.getElementById('photoArea').innerHTML=`
    <label for="fileInput" class="photo-label">
      <span class="ph-icon">📷</span><span class="ph-text">PRENDRE / CHOISIR PHOTO</span>
    </label>`;
  document.getElementById('fileInput').value='';
  updatePreview();
}

// ══ FILENAME ══
function pad(n){return String(n).padStart(3,'0');}
function getDate(){const d=new Date();return [d.getDate(),d.getMonth()+1,d.getFullYear()].map(x=>String(x).padStart(2,'0')).join('-');}

function buildFileName(){
  const bus = document.getElementById('busNum').value.trim();
  const camp = _sdValues.campagne;
  if(!bus||!camp||!_state.file) return null;
  const ext = _state.file.name.split('.').pop().toLowerCase();
  return `${pad(bus)}_${_state.action}_${camp.replace(/\s+/g,'-')}_${getDate()}.${ext}`;
}

function updatePreview(){
  const fn = buildFileName();
  const box = document.getElementById('fnameBox');
  const btn = document.getElementById('dlBtn');
  if(fn){ box.style.display='block'; document.getElementById('fnameVal').textContent='📎 '+fn; btn.disabled=false; }
  else { box.style.display='none'; btn.disabled=true; }
}

// ══ CAPTURE ══
async function doCapture(){
  const fn = buildFileName(); if(!fn) return;
  const btn = document.getElementById('dlBtn');
  btn.disabled=true; btn.textContent='⏳ Upload...';
  document.getElementById('progressWrap').style.display='block';

  const storageRef = storage.ref('photos/'+Date.now()+'_'+fn);
  const uploadTask = storageRef.put(_state.file);

  uploadTask.on('state_changed',
    snap => {
      const pct = Math.round(snap.bytesTransferred/snap.totalBytes*100);
      document.getElementById('progressFill').style.width = pct+'%';
      document.getElementById('progressText').textContent = 'Upload '+pct+'%';
    },
    err => {
      showToast('❌ Erreur upload');
      btn.disabled=false; btn.textContent='📤 ENVOYER LA PHOTO';
      document.getElementById('progressWrap').style.display='none';
    },
    async () => {
      const photoURL = await uploadTask.snapshot.ref.getDownloadURL();
      const storagePath = uploadTask.snapshot.ref.fullPath;
      await db.collection('records').add({
        bus: pad(document.getElementById('busNum').value.trim()),
        action: _state.action,
        campagne: _sdValues.campagne,
        depot: _sdValues.depot,
        poseur: _sdValues.poseur,
        fileName: fn,
        photoURL, storagePath,
        date: getDate(),
        time: new Date().toLocaleTimeString('fr-FR'),
        timestamp: Date.now()
      });
      document.getElementById('progressWrap').style.display='none';
      showToast('✅ Photo envoyée !');
      resetCapture();
    }
  );
}

function resetCapture(){
  document.getElementById('busNum').value='';
  _sdValues={campagne:'',depot:'',poseur:''};
  _state.file=null; _state.fileURL=null; _state.action='POSE';
  document.querySelectorAll('.act-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.act-btn.pose').classList.add('active');
  document.getElementById('photoArea').innerHTML=`
    <label for="fileInput" class="photo-label">
      <span class="ph-icon">📷</span><span class="ph-text">PRENDRE / CHOISIR PHOTO</span>
    </label>`;
  document.getElementById('fileInput').value='';
  document.getElementById('fnameBox').style.display='none';
  document.getElementById('btnArea').innerHTML=`
    <button class="btn-primary" id="dlBtn" onclick="doCapture()" disabled>📤 ENVOYER LA PHOTO</button>`;
  buildAllDropdowns();
}

// ══ HISTORY ══
let _histFilter = { action:'ALL', poseur:'ALL', date: getTodayStr() };

function getTodayStr(){
  const d=new Date();
  return [d.getDate(),d.getMonth()+1,d.getFullYear()].map(x=>String(x).padStart(2,'0')).join('-');
}

function initHistoryTab(){
  _histFilter.date = getTodayStr();
  updateDateDisplay();
  renderPoseurFilters();
  renderHistory();
}

function updateDateDisplay(){
  document.getElementById('dateDisplay').textContent = '📅 ' + _histFilter.date;
}

function changeDate(dir){
  const parts = _histFilter.date.split('-');
  const d = new Date(parts[2], parts[1]-1, parts[0]);
  d.setDate(d.getDate() + dir);
  _histFilter.date = [d.getDate(),d.getMonth()+1,d.getFullYear()].map(x=>String(x).padStart(2,'0')).join('-');
  updateDateDisplay();
  renderHistory();
}

function pickDate(){
  const picker = document.getElementById('datePicker');
  picker.click();
}

function onDatePick(val){
  if(!val) return;
  const [y,m,d] = val.split('-');
  _histFilter.date = [d,m,y].join('-');
  updateDateDisplay();
  renderHistory();
}

function setHistFilter(type, val, el){
  _histFilter[type] = val;
  const container = type==='action' ? document.getElementById('actionFilters') : document.getElementById('poseurFilters');
  container.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderHistory();
}

function renderPoseurFilters(){
  const poseurs = [...new Set(_records.map(r=>r.poseur).filter(Boolean))];
  const wrap = document.getElementById('poseurFilters');
  if(!poseurs.length){ wrap.innerHTML=''; return; }
  wrap.innerHTML = ['ALL',...poseurs].map(p=>
    `<button class="filter-btn${p===_histFilter.poseur||(_histFilter.poseur==='ALL'&&p==='ALL')?' active':''}" onclick="setHistFilter('poseur','${p}',this)">${p==='ALL'?'👥 TOUS':p}</button>`
  ).join('');
}

function renderHistory(){
  renderPoseurFilters();
  const list = document.getElementById('histList');
  let records = _records.filter(r => r.date === _histFilter.date);
  if(_histFilter.action !== 'ALL') records = records.filter(r=>r.action===_histFilter.action);
  if(_histFilter.poseur !== 'ALL') records = records.filter(r=>r.poseur===_histFilter.poseur);
  
  // Summary
  const summary = document.getElementById('histSummary');
  if(summary){
    const pose=records.filter(r=>r.action==='POSE').length;
    const depose=records.filter(r=>r.action==='DEPOSE').length;
    const film=records.filter(r=>r.action==='FILM').length;
    summary.textContent = records.length ? `${records.length} photo(s) · POSE:${pose} DEPOSE:${depose} FILM:${film}` : '';
  }

  if(!records.length){ list.innerHTML=`<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-text">AUCUNE PHOTO CE JOUR</div></div>`; return; }
  list.innerHTML = records.map(r=>`
    <div class="hist-item">
      <img class="hist-thumb" src="${r.photoURL||''}" onerror="this.style.display='none'"/>
      <div class="hist-info">
        <div class="hist-top">
          <span class="hist-badge ${r.action.toLowerCase()}">${r.action}</span>
          <span class="hist-bus">Bus ${r.bus}</span>
        </div>
        <div class="hist-fname">${r.campagne}${r.depot?' · '+r.depot:''}</div>
        <div class="hist-meta" style="color:var(--accent)">${r.poseur||'—'}</div>
        <div class="hist-meta" style="color:#444">${r.time}</div>
      </div>
      <div class="hist-actions">
        <button class="hist-dl" onclick="downloadPhoto('${r.photoURL}','${r.fileName}')">⬇️</button>
        <button class="hist-del" onclick="deleteRecord('${r.id}','${r.storagePath||''}')">🗑️</button>
      </div>
    </div>`).join('');
}

function downloadPhoto(url, name){
  const a=document.createElement('a'); a.href=url; a.download=name; a.target='_blank'; a.click();
}

async function deleteRecord(id, storagePath){
  if(!confirm('Supprimer cette photo ?')) return;
  try {
    await db.collection('records').doc(id).delete();
    if(storagePath){ try{ await storage.ref(storagePath).delete(); }catch(e){} }
    showToast('🗑️ Supprimé');
  } catch(e){ showToast('❌ Erreur'); }
}

// ══ STATS ══
function renderStats(){
  document.getElementById('statPose').textContent=_records.filter(r=>r.action==='POSE').length;
  document.getElementById('statDepose').textContent=_records.filter(r=>r.action==='DEPOSE').length;
  document.getElementById('statFilm').textContent=_records.filter(r=>r.action==='FILM').length;
}

function exportCSV(){
  if(!_records.length) return showToast('Aucune donnée');
  const h=['N°Bus','Action','Campagne','Depot','Poseur','Fichier','Date','Heure'];
  const rows=_records.map(r=>[r.bus,r.action,r.campagne,r.depot,r.poseur,r.fileName,r.date,r.time]);
  const csv=[h,...rows].map(r=>r.map(v=>`"${v||''}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='rapport_'+getDate()+'.csv'; a.click();
}

function exportTXT(){
  if(!_records.length) return showToast('Aucune donnée');
  const lines=['RAPPORT BUSTRACK - '+getDate(),'='.repeat(40),''];
  _records.forEach(r=>{ lines.push(`[${r.action}] Bus ${r.bus} | ${r.campagne} | ${r.depot||'-'} | ${r.poseur||'-'} | ${r.date} ${r.time}`); lines.push('  → '+r.fileName); });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8;'}));
  a.download='rapport_'+getDate()+'.txt'; a.click();
}

// ══ SETTINGS ══
function renderSettings(){
  renderTags('camp','campList',_cfg.camps);
  renderTags('depot','depotList',_cfg.depots);
  renderTags('poseur','poseurList',_cfg.poseurs);
}

function renderTags(type,listId,items){
  document.getElementById(listId).innerHTML=items.length
    ?items.map((item,i)=>`<div class="tag"><span>${item}</span><span class="tag-del" onclick="removeItem('${type}',${i})">×</span></div>`).join('')
    :'<span style="font-size:11px;color:var(--muted)">Aucun élément</span>';
}

async function addItem(type){
  const inputMap={camp:'newCamp',depot:'newDepot',poseur:'newPoseur'};
  const arrMap={camp:'camps',depot:'depots',poseur:'poseurs'};
  const input=document.getElementById(inputMap[type]);
  const val=input.value.trim(); if(!val) return;
  if(!_cfg[arrMap[type]].includes(val)){ _cfg[arrMap[type]].push(val); await saveConfig(); renderSettings(); buildAllDropdowns(); }
  input.value='';
}

async function removeItem(type,idx){
  const arrMap={camp:'camps',depot:'depots',poseur:'poseurs'};
  _cfg[arrMap[type]].splice(idx,1);
  await saveConfig(); renderSettings(); buildAllDropdowns();
}

function updateHeaderCount(){
  document.getElementById('totalCount').textContent=_records.length+' photos';
  const dot=document.getElementById('syncDot');
  dot.style.opacity='1'; setTimeout(()=>dot.style.opacity='0',1500);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

['newCamp','newDepot','newPoseur'].forEach(id=>{
  document.getElementById(id)?.addEventListener('keydown',e=>{
    if(e.key==='Enter'){const map={newCamp:'camp',newDepot:'depot',newPoseur:'poseur'};addItem(map[id]);}
  });
});

init();
</script>
